<!DOCTYPE html>
<html lang="en">
<head>
    <title>SI MUTAR KESATU | DASHBOARD ADMIN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../assert/img/logo.png">
    
    <script>
        if (sessionStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "../login.html"; 
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assert/css/style1.css">
    <link rel="stylesheet" href="../assert/css/styleHP1.css">
    <link rel="stylesheet" href="../assert/css/semua.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">

    <style>
        .sidebar { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-container { background: #fff; padding: 20px; border-radius: 10px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logout-btn { background-color: #d9534f; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .logout-btn:hover { background-color: #c9302c; }
        #loader { text-align: center; padding: 50px; display: none; }
    </style>
</head>

<body>
    <header>
        <nav class="nav-top">
            <div class="top no">PANEL ADMIN - SI MUTAR KESATU</div>
            <a href="#" class="top active">Dashboard</a>
            <a href="../index.html" class="top">Lihat Website</a>
            <button onclick="logout()" class="logout-btn" style="margin-left: 20px;">
                <i class="fa fa-sign-out"></i> Keluar
            </button>
        </nav>
    </header>

    <main class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center">
                    <h2>Data Hasil Pemeriksaan</h2>
                    <button class="btn btn-success btn-sm" onclick="muatData()">
                        <i class="fa fa-refresh"></i> Refresh Data
                    </button>
                </div>
                <hr>

                <div id="loader">
                    <i class="fa fa-spinner fa-spin fa-3x"></i>
                    <p>Mengambil data dari Google Sheets...</p>
                </div>

                <div class="table-responsive table-container">
                    <table class="table table-hover align-middle">
                        <thead class="table-primary">
                            <tr>
                                <th>No</th>
                                <th>NIK</th>
                                <th>Nama Pasien</th>
                                <th>Tgl Pemeriksaan</th>
                                <th>Hasil (H1-H6)</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-5">
        <p>&#169; 2024 SI MUTAR KESATU | Admin Panel</p>
    </footer>

    <script>
        // Fungsi Logout
        function logout() {
            sessionStorage.clear();
            window.location.href = "../login.html";
        }

        // Fungsi Ambil Data dari Google Sheets
        async function muatData() {
            const loader = document.getElementById('loader');
            const tabelBody = document.getElementById('tabelBody');
            
            loader.style.display = 'block';
            tabelBody.innerHTML = '';

            // GANTI DENGAN URL WEB APP GOOGLE SCRIPT ANDA
            const scriptURL = 'https://script.google.com/macros/s/AKfycbw0BS7Uxkshkw36bilDA53NafiFX2SiGew8W4COGXttYlEdYUIKFX-PH2_edIz0hmYDFQ/exec';

            try {
                // Kita panggil action "readAll" (kita perlu tambah di Apps Script nanti)
                const response = await fetch(`${scriptURL}?action=readAll`);
                const data = await response.json();

                loader.style.display = 'none';

                if (data.length > 0) {
                    data.forEach((row, index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${row.nik || '-'}</td>
                            <td><b>${row.nama || '-'}</b></td>
                            <td>${row.tanggal_pemeriksaan || '-'}</td>
                            <td>
                                <small>
                                    H1: ${row.h1 || '-'} | H2: ${row.h2 || '-'} | H3: ${row.h3 || '-'}<br>
                                    H4: ${row.h4 || '-'} | H5: ${row.h5 || '-'} | H6: ${row.h6 || '-'}
                                </small>
                            </td>
                            <td>
                                <button class="btn btn-info btn-sm" onclick="alert('Fitur Edit/Hapus harus via Google Sheets langsung')">
                                    <i class="fa fa-eye"></i>
                                </button>
                            </td>
                        `;
                        tabelBody.appendChild(tr);
                    });
                } else {
                    tabelBody.innerHTML = '<tr><td colspan="6" class="text-center">Tidak ada data ditemukan.</td></tr>';
                }
            } catch (error) {
                loader.style.display = 'none';
                alert('Gagal mengambil data!');
                console.error(error);
            }
        }

        // Jalankan fungsi muat data saat halaman dibuka
        window.onload = muatData;
    </script>
</body>
</html>
